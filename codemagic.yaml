workflows:
  ios-unsigned:
    name: iOS Unsigned IPA (for Sideloadly)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build unsigned IPA
        script: |
          flutter build ipa --no-codesign
          # Flutter 3.44+ skips IPA packaging when --no-codesign is used.
          # Manually package the .app from the xcarchive into a valid IPA.
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r WordleGuesser-unsigned.ipa Payload
    artifacts:
      - build/ios/ipa/WordleGuesser-unsigned.ipa
